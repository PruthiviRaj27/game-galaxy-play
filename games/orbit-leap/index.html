<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Orbit Leap — Game Galaxy</title>

    <!-- Standard favicon -->
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- PNG favicons for modern browsers -->
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">

    <!-- Android / Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/android-chrome-512x512.png">

    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03000a;
            overscroll-behavior-y: none;
            touch-action: none;
        }

        #game-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 10%;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.1);
            transition: transform 0.1s;
            z-index: 5;
            letter-spacing: -2px;
        }

        #score-display.bump {
            transform: scale(1.1);
            color: rgba(255, 255, 255, 0.4);
        }

        .panel {
            background: rgba(15, 0, 40, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            max-width: 85%;
            width: 320px;
            z-index: 20;
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .panel h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .panel h1 span {
            color: #ffde00;
            text-shadow: 0 0 15px rgba(255, 222, 0, 0.5);
        }

        .panel p {
            color: #a0a0c0;
            font-size: 1rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .panel h2 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .scores {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
        }

        .scores p {
            font-size: 1.1rem;
            color: #889;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .scores p:last-child { margin-bottom: 0; }

        .scores span {
            color: #fff;
            font-weight: 700;
        }

        .btn {
            background: #ffde00;
            border: none;
            padding: 16px 0;
            width: 100%;
            border-radius: 16px;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.96);
            background: #e6c700;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-display" class="hidden">0</div>
            
            <div id="main-menu" class="panel">
                <h1>ORBIT<br><span>LEAP</span></h1>
                <p>Wait for the gap, then tap to leap to the next ring!</p>
                <button id="start-btn" class="btn">LAUNCH SHIP</button>
            </div>
            
            <div id="game-over" class="panel hidden">
                <h2>COLLISION</h2>
                <div class="scores">
                    <p>RINGS LEAPED <span>0</span></p>
                    <p>MAX ALTITUDE <span>0</span></p>
                </div>
                <button id="retry-btn" class="btn">RETRY FLIGHT</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const uiScore = document.getElementById('score-display');
        const mainMenu = document.getElementById('main-menu');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');

        let w, h, cx, cy;
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            cx = w / 2;
            cy = h / 2;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        const STATE_MENU = 0;
        const STATE_PLAYING = 1;
        const STATE_GAMEOVER = 2;

        let state = STATE_MENU;
        let bestScore = parseInt(localStorage.getItem('orbitLeapBestScore') || 0);
        let score = 0;

        let ship = {
            radius: 60,
            targetRadius: 60,
            leapProgress: 1, // 1 = attached to ring
            size: 8,
            color: '#fff',
            collidedThisLeap: false
        };

        let rings = [];
        let particles = [];
        let stars = [];
        let cameraY = 0;
        let targetCameraY = 0;

        function initStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 2,
                    a: Math.random()
                });
            }
        }

        function spawnRing(index) {
            // Rings are at 100, 180, 260... (Lanes are at 60, 140, 220...)
            const radius = 100 + (index - 1) * 80;
            
            // Multiple gaps based on ring size
            const numGaps = Math.min(4, 1 + Math.floor(index / 5)); 
            const gapSize = Math.max(0.3, (0.9 / numGaps) - (index * 0.01));
            const speed = (0.8 + (index * 0.08)) * (Math.random() > 0.5 ? 1 : -1);
            
            rings.push({
                radius: radius,
                angle: Math.random() * Math.PI * 2,
                numGaps: numGaps,
                gapSize: gapSize, 
                speed: speed,
                index: index,
                color: `hsl(${200 + index * 15}, 80%, 60%)`
            });
        }

        function initLevel() {
            rings = [];
            for (let i = 0; i < 5; i++) {
                spawnRing(i + 1);
            }
            
            ship.radius = 60;
            ship.targetRadius = 60;
            ship.leapProgress = 1;
            ship.collidedThisLeap = false;
            
            score = 0;
            uiScore.innerText = score;
            cameraY = 0;
            targetCameraY = 0;
            particles = [];
        }

        function showMenu() {
            state = STATE_MENU;
            uiScore.classList.add('hidden');
            mainMenu.classList.remove('hidden');
            gameOverScreen.classList.add('hidden');
            initLevel();
        }

        function initGame() {
            initLevel();
            state = STATE_PLAYING;
            updateUI(true);
        }

        function updateUI(playing) {
            if (playing) {
                uiScore.classList.remove('hidden');
                mainMenu.classList.add('hidden');
                gameOverScreen.classList.add('hidden');
            } else {
                uiScore.classList.add('hidden');
                gameOverScreen.classList.remove('hidden');
                const scoreEls = gameOverScreen.querySelectorAll('.scores span');
                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('orbitLeapBestScore', bestScore);
                }
                scoreEls[0].innerText = score;
                scoreEls[1].innerText = bestScore;
            }
        }

        function handleGameOver() {
            state = STATE_GAMEOVER;
            updateUI(false);
            const shipX = cx;
            const shipY = cy + ship.radius - cameraY;
            createExplosion(shipX, shipY, '#fff', 30);
            if (navigator.vibrate) navigator.vibrate([150, 50, 150]);
        }

        function leap() {
            if (state === STATE_PLAYING && ship.leapProgress >= 1) {
                ship.leapProgress = 0;
                ship.targetRadius = ship.radius + 80;
                ship.collidedThisLeap = false;
                if (navigator.vibrate) navigator.vibrate(10);
            }
        }

        const inputHandler = (e) => {
            if (state === STATE_MENU) return;
            if (e.type === 'touchstart') e.preventDefault();
            leap();
        };

        canvas.addEventListener('mousedown', inputHandler);
        canvas.addEventListener('touchstart', inputHandler, {passive: false});
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') inputHandler(e);
        });

        startBtn.addEventListener('click', initGame);
        retryBtn.addEventListener('click', () => {
            if (window.Android && window.Android.showAd) {
                window.Android.showAd();
            } else {
                window.restartGame();
            }
        });

        window.restartGame = function() {
            showMenu();
        };

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const mag = Math.random() * 200 + 50;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * mag,
                    vy: Math.sin(angle) * mag,
                    life: 1,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function update(dt) {
            if (state === STATE_PLAYING) {
                // Update Rings
                for (let r of rings) {
                    r.angle += r.speed * dt;
                }

                // Ship Leaping Logic
                if (ship.leapProgress < 1) {
                    const prevProgress = ship.leapProgress;
                    ship.leapProgress += 4 * dt; 

                    // Check collision at mid-leap (Progress 0.5)
                    if (prevProgress < 0.5 && ship.leapProgress >= 0.5 && !ship.collidedThisLeap) {
                        const currentRing = rings.find(r => r.index === score + 1);
                        if (currentRing) {
                            let angle = (currentRing.angle % (Math.PI * 2));
                            if (angle < 0) angle += Math.PI * 2;
                            
                            const shipAngle = Math.PI / 2; // Ship is at bottom
                            
                            // Multi-Port Collision check
                            let hit = true;
                            const gapSpacing = (Math.PI * 2) / currentRing.numGaps;
                            
                            for (let g = 0; g < currentRing.numGaps; g++) {
                                let gapAngle = (angle + g * gapSpacing) % (Math.PI * 2);
                                let distToGap = Math.abs(shipAngle - gapAngle);
                                if (distToGap > Math.PI) distToGap = Math.PI * 2 - distToGap;
                                
                                if (distToGap <= currentRing.gapSize / 2) {
                                    hit = false;
                                    break;
                                }
                            }
                            
                            if (hit) {
                                ship.collidedThisLeap = true;
                                handleGameOver();
                            } else {
                                score++;
                                uiScore.innerText = score;
                                uiScore.classList.add('bump');
                                setTimeout(() => uiScore.classList.remove('bump'), 100);
                                targetCameraY = (score * 80);
                                spawnRing(rings.length + 1);
                                if (navigator.vibrate) navigator.vibrate(15);
                            }
                        }
                    }

                    if (ship.leapProgress >= 1) {
                        ship.leapProgress = 1;
                        ship.radius = ship.targetRadius;
                    }
                }
                
                ship.radius = (1 - ship.leapProgress) * (ship.targetRadius - 80) + ship.leapProgress * ship.targetRadius;
                cameraY += (targetCameraY - cameraY) * 5 * dt;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 1.5 * dt;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);

            // Stars
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.a * 0.3})`;
                ctx.fillRect(s.x, (s.y - (cameraY * 0.2) % h + h) % h, s.s, s.s);
            }

            ctx.save();
            ctx.translate(cx, cy - cameraY);

            // Rings
            for (let r of rings) {
                const gapSpacing = (Math.PI * 2) / r.numGaps;
                
                for (let g = 0; g < r.numGaps; g++) {
                    ctx.beginPath();
                    ctx.strokeStyle = r.color;
                    ctx.lineWidth = 6;
                    ctx.lineCap = 'round';
                    
                    const centerAngle = r.angle + g * gapSpacing;
                    const startAngle = centerAngle + r.gapSize / 2;
                    const endAngle = centerAngle + gapSpacing - r.gapSize / 2;
                    
                    ctx.arc(0, 0, r.radius, startAngle, endAngle);
                    ctx.stroke();
                    
                    ctx.globalAlpha = 0.2;
                    ctx.lineWidth = 15;
                    ctx.stroke();
                    ctx.globalAlpha = 1.0;
                }
            }

            // Central Core
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#ffde00';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ffde00';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Player Ship
            if (state !== STATE_GAMEOVER) {
                const shipY = ship.radius;
                ctx.save();
                ctx.translate(0, shipY);
                
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fff';
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(0, -8); // Slightly smaller
                ctx.lineTo(-6, 6);
                ctx.lineTo(6, 6);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            ctx.restore();

            // Particles (in screen space)
            for (let p of particles) {
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1.0;

            if (state === STATE_GAMEOVER) {
                ctx.fillStyle = 'rgba(255, 0, 100, 0.1)';
                ctx.fillRect(0, 0, w, h);
            }
        }

        let lastTime = 0;
        function gameLoop(t) {
            const dt = Math.min(0.1, (t - lastTime) / 1000);
            lastTime = t;
            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        initStars();
        requestAnimationFrame(gameLoop);
        showMenu();
    </script>
</body>
</html>
