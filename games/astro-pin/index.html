<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Astro Pin — Game Galaxy</title>

    <!-- Standard favicon -->
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- PNG favicons for modern browsers -->
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">

    <!-- Android / Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/android-chrome-512x512.png">

    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #03050c;
            overscroll-behavior-y: none;
            touch-action: none;
        }

        #game-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 8%;
            font-size: 5rem;
            font-weight: 900;
            color: #ffffff;
            opacity: 0.2;
            transition: transform 0.1s, opacity 0.1s;
            z-index: 2;
            pointer-events: none;
            letter-spacing: 5px;
        }

        #score-display.bump {
            transform: scale(1.1);
            opacity: 0.5;
        }

        .panel {
            background: rgba(3, 5, 12, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 204, 255, 0.3);
            padding: 40px 30px;
            text-align: center;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 85%;
            width: 320px;
            z-index: 20;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .panel h1 {
            font-size: 3rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 25px;
            letter-spacing: 8px;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .panel h1 span {
            color: #00ccff;
        }

        .panel p {
            color: #eeeeee;
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        .panel h2 {
            font-size: 1.8rem;
            color: #ff3366;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
        }

        .scores {
            margin-bottom: 30px;
            width: 100%;
        }

        .scores p {
            font-size: 0.9rem;
            color: #888888;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            letter-spacing: 1px;
        }

        .scores span {
            color: #ffffff;
            font-weight: 700;
        }

        .scores span#best-score {
            color: #00ccff;
        }

        .btn {
            background: transparent;
            border: 2px solid #00ccff;
            padding: 15px 0;
            width: 100%;
            color: #00ccff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0, 204, 255, 0.1), 0 0 10px rgba(0, 204, 255, 0.1);
        }

        .btn:active {
            background: rgba(0, 204, 255, 0.2);
            transform: scale(0.97);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="score-display" class="hidden">0</div>

            <div id="main-menu" class="panel">
                <h1>ASTRO<br><span>PIN</span></h1>
                <p>Tap to FIRE probe.<br>Stick all probes into the core.<br>Don't hit other probes!</p>
                <button id="start-btn" class="btn">INITIATE LAUNCH</button>
            </div>

            <div id="game-over" class="panel hidden">
                <h2 id="death-reason">PROBE COLLISION</h2>
                <div class="scores">
                    <p>SYSTEMS PASSED <span id="final-score">0</span></p>
                    <p>FURTHEST REACH <span id="best-score">0</span></p>
                </div>
                <button id="retry-btn" class="btn">REBOOT SEQUENCE</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const uiScore = document.getElementById('score-display');
        const mainMenu = document.getElementById('main-menu');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const deathReasonEl = document.getElementById('death-reason');

        let w, h;
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();

        const STATE_MENU = 0;
        const STATE_PLAYING = 1;
        const STATE_GAMEOVER = 2;

        let state = STATE_MENU;
        let bestScore = parseInt(localStorage.getItem('astroPinBestScore') || 0);

        const COL_WHITE = '#ffffff';
        const COL_CYAN = '#00ccff';
        const COL_DANGER = '#ff3366';

        let level = 1;
        let core = {
            x: 0,
            y: 0,
            r: 60,
            rotation: 0,
            baseSpeed: 1.2, // Radians per second
            targetSpeed: 1.2,
            currentSpeed: 1.2,
            stateTimer: 0
        };

        let probesLeft = 5;
        let flyingProbe = null;
        let stuckProbes = []; // {angle: float}
        let stars = [];
        let particles = [];
        let levelTransition = false;
        let transitionProgress = 0;

        function generateStars() {
            stars = [];
            for (let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    s: Math.random() * 2 + 0.5,
                    speed: Math.random() * 30 + 10,
                    alpha: Math.random() * 0.5 + 0.1
                });
            }
        }

        function initLevel(lvl) {
            level = lvl;
            uiScore.innerText = level - 1;
            core.x = w / 2;
            core.y = h * 0.35;
            core.r = Math.max(40, 80 - (level * 2));
            core.rotation = 0;

            // Speed logic
            core.baseSpeed = 1.2 + (level * 0.3);
            if (core.baseSpeed > 4.8) core.baseSpeed = 4.8;
            core.targetSpeed = core.baseSpeed;
            core.currentSpeed = core.baseSpeed;
            core.stateTimer = 0;

            probesLeft = 5 + Math.floor(level / 2);
            stuckProbes = [];

            let randomStarts = Math.floor(level / 3);
            for (let i=0; i<randomStarts; i++) {
                stuckProbes.push({ angle: Math.random() * Math.PI * 2 });
            }

            flyingProbe = null;
            particles = [];
            levelTransition = false;
            transitionProgress = 0;
        }

        function initGame() {
            initLevel(1);
            state = STATE_PLAYING;
            updateUI(true);
        }

        function updateUI(playing) {
            if (playing) {
                uiScore.classList.remove('hidden');
                mainMenu.classList.add('hidden');
                gameOverScreen.classList.add('hidden');
            } else {
                uiScore.classList.add('hidden');
                gameOverScreen.classList.remove('hidden');

                let displayScore = level - 1;
                if (displayScore > bestScore) {
                    bestScore = displayScore;
                    localStorage.setItem('astroPinBestScore', bestScore);
                }
                finalScoreEl.innerText = displayScore;
                bestScoreEl.innerText = bestScore;
            }
        }

        function handleGameOver(reason) {
            state = STATE_GAMEOVER;
            deathReasonEl.innerText = reason;
            updateUI(false);

            if (flyingProbe) {
                createExplosion(flyingProbe.x, flyingProbe.y, COL_DANGER, 20, 200);
            }
            createExplosion(core.x, core.y + core.r, COL_WHITE, 10, 150);
            if (navigator.vibrate) navigator.vibrate([200, 50, 100]);
        }

        function fireProbe() {
            if (state === STATE_PLAYING && !levelTransition) {
                if (probesLeft > 0 && !flyingProbe) {
                    flyingProbe = {
                        x: w / 2,
                        y: h * 0.85,
                        vy: -1800 // Pixels per second
                    };
                    probesLeft--;
                    if (navigator.vibrate) navigator.vibrate(10);
                }
            }
        }

        function onInput(e) {
            if (state !== STATE_PLAYING) return;
            if (e.type === 'touchstart') e.preventDefault();
            fireProbe();
        }

        window.addEventListener('mousedown', onInput);
        window.addEventListener('touchstart', onInput, {passive: false});
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') onInput(e);
        });

        startBtn.addEventListener('click', initGame);
        retryBtn.addEventListener('click', () => {
            if (window.Android && window.Android.showAd) {
                window.Android.showAd();
            } else {
                initGame();
            }
        });

        window.restartGame = function() {
            initGame();
        };

        function createExplosion(x, y, color, count, maxVel = 200) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * maxVel,
                    vy: (Math.random() - 0.5) * maxVel,
                    life: 1,
                    color: color
                });
            }
        }

        function update(dt) {
            // Parallax stars
            for (let s of stars) {
                s.y += s.speed * (levelTransition ? 5 : 2) * dt;
                if (s.y > h + 50) {
                    s.y = -50;
                    s.x = Math.random() * w;
                }
            }

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 1.5 * dt;
                if (p.life <= 0) particles.splice(i, 1);
            }

            if (state === STATE_MENU) {
                core.x = w / 2;
                core.y = h * 0.4;
                core.rotation += 0.6 * dt;
                return;
            }

            if (state !== STATE_PLAYING) return;

            if (levelTransition) {
                transitionProgress += dt;
                core.y -= transitionProgress * 500 * dt;

                if (transitionProgress > 1.5) {
                    initLevel(level + 1);
                    uiScore.classList.add('bump');
                    setTimeout(() => uiScore.classList.remove('bump'), 100);
                }
                return;
            }

            core.stateTimer += dt;
            if (level >= 3) {
                if (core.stateTimer > 2) {
                    core.stateTimer = 0;
                    let action = Math.random();
                    if (action < 0.3 && level >= 5) {
                        core.targetSpeed = -core.baseSpeed;
                    } else if (action < 0.6) {
                        core.targetSpeed = 0;
                    } else if (action < 0.8) {
                        core.targetSpeed = core.baseSpeed * 2.5;
                    } else {
                        core.targetSpeed = core.baseSpeed;
                    }
                }
            }

            core.currentSpeed += (core.targetSpeed - core.currentSpeed) * 3 * dt;
            core.rotation += core.currentSpeed * dt;

            if (flyingProbe) {
                flyingProbe.y += flyingProbe.vy * dt;

                if (flyingProbe.y <= core.y + core.r) {
                    let hit = false;
                    for (let pin of stuckProbes) {
                        let currentWorldAngle = (pin.angle + core.rotation) % (Math.PI * 2);
                        if (currentWorldAngle < 0) currentWorldAngle += Math.PI * 2;

                        let diff = Math.abs(currentWorldAngle - (Math.PI/2));
                        if (diff > Math.PI) diff = (Math.PI * 2) - diff;

                        let threshold = 0.2;

                        if (diff < threshold) {
                            hit = true;
                            break;
                        }
                    }

                    if (hit) {
                        handleGameOver("PROBE COLLISION");
                    } else {
                        stuckProbes.push({ angle: (Math.PI/2) - core.rotation });
                        flyingProbe = null;
                        createExplosion(w/2, core.y + core.r, COL_CYAN, 5, 100);

                        if (navigator.vibrate) navigator.vibrate(5);

                        if (probesLeft === 0) {
                            levelTransition = true;
                            transitionProgress = 0;
                            if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
                        }
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, w, h);

            // Draw Starfield
            for (let s of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.beginPath();
                if (levelTransition) {
                    ctx.fillRect(s.x, s.y, s.s, s.s * 10);
                } else {
                    ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
                    ctx.fill();
                }
            }

            // Draw Particles
            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;

            if (state === STATE_GAMEOVER) {
                ctx.fillStyle = 'rgba(255, 51, 102, 0.2)';
                ctx.fillRect(0, 0, w, h);
            }

            // Draw Waiting Probes
            let probeSpacing = 20;
            let startWaitY = h * 0.95;
            for (let i = 0; i < probesLeft; i++) {
                drawProbe(w / 2, startWaitY - (i * probeSpacing), 0);
            }

            // Draw Flying Probe
            if (flyingProbe) {
                drawProbe(flyingProbe.x, flyingProbe.y, 0);
            }

            // Draw Core & Stuck Probes
            ctx.save();
            ctx.translate(core.x, core.y);

            if (state !== STATE_GAMEOVER || deathReasonEl.innerText !== "PROBE COLLISION") {
                ctx.rotate(core.rotation);

                for (let pin of stuckProbes) {
                    let px = Math.cos(pin.angle) * core.r;
                    let py = Math.sin(pin.angle) * core.r;
                    drawProbeLocal(px, py, pin.angle);
                }

                ctx.fillStyle = COL_WHITE;
                ctx.shadowColor = COL_CYAN;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(0, 0, core.r, 0, Math.PI*2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(0, 0, core.r * 0.4, 0, Math.PI*2);
                ctx.fill();

                ctx.strokeStyle = COL_CYAN;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 10]);
                ctx.beginPath();
                ctx.arc(0, 0, core.r * 0.7, 0, Math.PI*2);
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                if (Date.now() % 200 < 100) {
                    ctx.fillStyle = COL_DANGER;
                    ctx.beginPath();
                    ctx.arc(0, 0, core.r, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            ctx.restore();
        }

        function drawProbeLocal(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.strokeStyle = COL_WHITE;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(40, 0);
            ctx.stroke();
            ctx.fillStyle = COL_CYAN;
            ctx.beginPath();
            ctx.arc(40, 0, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        function drawProbe(x, y, angle) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle - Math.PI/2);
            ctx.strokeStyle = COL_WHITE;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(40, 0);
            ctx.stroke();
            ctx.fillStyle = COL_CYAN;
            ctx.beginPath();
            ctx.arc(40, 0, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        let lastTimeLoop = 0;
        function gameLoop(timestamp) {
            if (!lastTimeLoop) lastTimeLoop = timestamp;
            const dt = (timestamp - lastTimeLoop) / 1000;
            lastTimeLoop = timestamp;

            update(dt > 0.1 ? 0.1 : dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        generateStars();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
