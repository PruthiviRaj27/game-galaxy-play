<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Tower — Game Galaxy</title>

    <!-- Standard favicon -->
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

    <!-- PNG favicons for modern browsers -->
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">

    <!-- Android / Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/android-chrome-512x512.png">

    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Teko', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* FIXED: Added height/min-height for the root */
        html, body {
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            overflow: hidden;
            background-color: #08080c;
            overscroll-behavior-y: none;
            touch-action: none;
        }

        /* FIXED: Use fixed positioning to bypass WebView height bugs */
        #game-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                linear-gradient(rgba(0, 255, 128, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 128, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center bottom;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #score-display {
            position: absolute;
            top: 10%;
            font-size: 6rem;
            font-weight: 700;
            line-height: 1;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }

        #score-display.bump {
            transform: scale(1.2);
            color: #fff;
        }

        .panel {
            background: rgba(10, 10, 16, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 150, 0.2);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 255, 150, 0.05);
            max-width: 85%;
            width: 320px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel h1 {
            font-size: 4.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 0.9;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .panel h1 span {
            color: #00ffaa;
            text-shadow: 0 0 20px rgba(0, 255, 170, 0.6);
        }

        .panel p {
            color: #889;
            font-size: 1.4rem;
            margin-bottom: 30px;
            line-height: 1.2;
            font-family: sans-serif;
        }

        .panel h2 {
            font-size: 3rem;
            color: #ff3366;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
            line-height: 1;
        }

        .scores {
            margin-bottom: 30px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            width: 100%;
        }

        .scores p {
            font-size: 1.4rem;
            color: #aaa;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            font-family: sans-serif;
        }

        .scores span { font-weight: bold; color: #fff; }

        .btn {
            background: linear-gradient(90deg, #00ffaa, #00b3ff);
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            color: #000;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 255, 170, 0.3);
            transition: all 0.1s;
            outline: none;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="score-display" class="hidden">0</div>

        <div id="main-menu" class="panel">
            <h1>NEON<br><span>TOWER</span></h1>
            <p>Tap anywhere to drop the block. Stack as high as you can!</p>
            <button id="start-btn" class="btn">START STACKING</button>
        </div>

        <div id="game-over" class="panel hidden">
            <h2>TOWER COLLAPSED</h2>
            <div class="scores">
                <p>Height: <span id="final-score">0</span></p>
                <p>Highest: <span id="best-score">0</span></p>
            </div>
            <button id="retry-btn" class="btn">TRY AGAIN</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const uiScore = document.getElementById('score-display');
    const mainMenu = document.getElementById('main-menu');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreEl = document.getElementById('final-score');
    const bestScoreEl = document.getElementById('best-score');
    const startBtn = document.getElementById('start-btn');
    const retryBtn = document.getElementById('retry-btn');

    let w, h;
    function resize() {
        const dpr = window.devicePixelRatio || 1;
        w = window.innerWidth;
        h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resize);

    const STATE_MENU = 0;
    const STATE_PLAYING = 1;
    const STATE_GAMEOVER = 2;

    let state = STATE_MENU;
    let bestScore = parseInt(localStorage.getItem('neonTowerBestScore') || 0);

    let boxHeight, initialWidth;
    let blocks = [];
    let activeBlock = null;
    let debris = [];
    let score = 0;
    let cameraY = 0;
    let targetCameraY = 0;
    let currentHue = 180;
    let lastTime = 0;

    function createBaseBlock() {
        blocks = [{
            x: w / 2 - initialWidth / 2,
            y: h - boxHeight - 40,
            w: initialWidth,
            h: boxHeight,
            color: `hsl(${currentHue}, 80%, 50%)`
        }];
    }

    function initGame() {
        state = STATE_PLAYING;
        score = 0;
        currentHue = 180;
        cameraY = 0;
        targetCameraY = 0;
        debris = [];
        lastTime = 0;

        uiScore.innerText = score;
        uiScore.classList.remove('hidden');
        mainMenu.classList.add('hidden');
        gameOverScreen.classList.add('hidden');

        resize();
        boxHeight = Math.min(45, h * 0.05);
        initialWidth = Math.min(w * 0.7, 300);

        createBaseBlock();
        spawnNextBlock();
    }

    function handleGameOver() {
        state = STATE_GAMEOVER;
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('neonTowerBestScore', bestScore);
        }
        finalScoreEl.innerText = score;
        bestScoreEl.innerText = bestScore;
        uiScore.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        if (activeBlock) {
            createDebris(activeBlock.x, activeBlock.y, activeBlock.w, activeBlock.color, (activeBlock.vx > 0 ? 1 : -1));
            activeBlock = null;
        }
    }

    function spawnNextBlock() {
        let prevBlock = blocks[blocks.length - 1];
        currentHue = (currentHue + 8) % 360;
        let speed = 210 + (score * 8);
        let dir = (score % 2 === 0) ? 1 : -1;

        activeBlock = {
            x: (dir === 1) ? -prevBlock.w : w,
            y: prevBlock.y - boxHeight,
            w: prevBlock.w,
            h: boxHeight,
            vx: speed * dir,
            color: `hsl(${currentHue}, 90%, 60%)`
        };

        let idealScreenY = h * 0.6;
        targetCameraY = Math.max(0, (h - activeBlock.y) - idealScreenY);
    }

    function sliceBlock() {
        if (!activeBlock || state !== STATE_PLAYING) return;
        let prevBlock = blocks[blocks.length - 1];
        let leftBound = Math.max(activeBlock.x, prevBlock.x);
        let rightBound = Math.min(activeBlock.x + activeBlock.w, prevBlock.x + prevBlock.w);
        let overlapWidth = rightBound - leftBound;

        if (overlapWidth > 0) {
            if (activeBlock.x < leftBound) createDebris(activeBlock.x, activeBlock.y, leftBound - activeBlock.x, activeBlock.color, -1);
            if (activeBlock.x + activeBlock.w > rightBound) createDebris(rightBound, activeBlock.y, (activeBlock.x + activeBlock.w) - rightBound, activeBlock.color, 1);

            blocks.push({ x: leftBound, y: activeBlock.y, w: overlapWidth, h: activeBlock.h, color: activeBlock.color });
            score++;
            uiScore.innerText = score;
            uiScore.classList.add('bump');
            setTimeout(() => uiScore.classList.remove('bump'), 150);
            spawnNextBlock();
        } else {
            handleGameOver();
        }
    }

    function createDebris(x, y, width, color, dirMult) {
        debris.push({ x, y, w: width, h: boxHeight, color, vy: 0, vx: Math.random() * 2 * dirMult, rotation: 0, vr: (Math.random() - 0.5) * 0.15 });
    }

    function onInput(e) {
        if (state === STATE_PLAYING) sliceBlock();
    }

    canvas.addEventListener('mousedown', onInput);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); onInput(e); }, {passive: false});
    window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') onInput(e); });

    startBtn.addEventListener('click', initGame);
    retryBtn.addEventListener('click', () => {
        if (window.Android && window.Android.showAd) { window.Android.showAd(); }
        else { initGame(); }
    });

    // Global callback for Android to restart the game
    window.restartGame = function() {
      initGame();
    };

    function update(dt) {
        if (state === STATE_PLAYING && activeBlock) {
            activeBlock.x += activeBlock.vx * dt;
            if (activeBlock.x > w + 20 && activeBlock.vx > 0) activeBlock.vx *= -1;
            if (activeBlock.x < -activeBlock.w - 20 && activeBlock.vx < 0) activeBlock.vx *= -1;
        }
        for (let i = debris.length - 1; i >= 0; i--) {
            let d = debris[i]; d.vy += 30 * dt; d.x += d.vx * 60 * dt; d.y += d.vy * 60 * dt; d.rotation += d.vr * 60 * dt;
            if (d.y > h + cameraY + 100) debris.splice(i, 1);
        }
        cameraY += (targetCameraY - cameraY) * (1 - Math.exp(-10 * dt));
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.save();
        ctx.translate(0, cameraY);
        for (let b of blocks) {
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);
        }
        if (activeBlock) {
            ctx.fillStyle = activeBlock.color;
            ctx.fillRect(activeBlock.x, activeBlock.y, activeBlock.w, activeBlock.h);
        }
        for (let d of debris) {
            ctx.save();
            ctx.translate(d.x + d.w/2, d.y + d.h/2);
            ctx.rotate(d.rotation);
            ctx.fillStyle = d.color;
            ctx.fillRect(-d.w/2, -d.h/2, d.w, d.h);
            ctx.restore();
        }
        ctx.restore();
    }

    function gameLoop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        let dt = (timestamp - lastTime) / 1000;
        lastTime = timestamp;
        if (dt > 0.1) dt = 0.1;
        update(dt);
        draw();
        requestAnimationFrame(gameLoop);
    }

    resize();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
